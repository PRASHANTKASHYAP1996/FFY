name: friendify
description: Friendify MVP
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.15.2

  # Firebase App Check
  firebase_app_check: ^0.3.2+10

  # Auth
  firebase_auth: ^5.7.0

  # Database
  cloud_firestore: ^5.6.12

  # Cloud Functions
  cloud_functions: ^5.6.2

  # Push / Incoming Call
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.3
  flutter_callkit_incoming: ^3.0.0

  # Ongoing background call service
  flutter_foreground_task: ^9.2.1

  # Voice Calling
  agora_rtc_engine: ^6.5.3

  # Payments
  razorpay_flutter: ^1.4.2

  # Permissions
  permission_handler: ^11.4.0

  # Local storage
  shared_preferences: ^2.5.4

  # Profile photos
  firebase_storage: ^12.4.10
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true